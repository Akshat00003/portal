<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile </title>
    <link rel="stylesheet" href="../static/dashboard.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <style>
        #box2 {
            display: flex;
            height: max-content;
            flex-direction: column;
            align-items: center;
        }

        h3 {
            margin: 10px;

        }

        #form {
            width: 500px;
        
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="main">
        <div id="canvas">
            <div id="nav">
                <h1>Placement Portal </h1>
            </div>
            <div id="navbar">
                <h5> Welcome {{this_user.f_name}} </h5>
            </div>
            <div class="content">
                <div id="box1">
                    <div id="tags">
                        <a href="/student_dashboard/{{this_user.id}}" class="btn btn-warning"> DASHBOARD </a>
                        <a href="" class="btn btn-warning"> COMPLETE PROFILE </a>
                        <a href="/student_application_history/{{this_user.id}}" class="btn btn-warning"> HISTORY </a>
                        <a href="/" class="btn btn-danger"> LOGOUT </a>
                    </div>

                </div>
                <div id="box2">
                    <h3 class="btn btn-warning">Complete Profile</h3>
                    <div id="form">
                        <form action="/edit_stu_profile/{{this_user.id}}" method="post" enctype="multipart/form-data">

                            <div class="mb-3">
                                <label for="in_1" class="form-label">First name:</label>
                                <input type="text" class="form-control" id="in_1" placeholder="Ex-JOHN" name="f_name">
                            </div>

                            <div class="mb-3">
                                <label for="in_2" class="form-label"> Last name:</label>
                                <input type="text" class="form-control" id="in_2" placeholder="Ex - DOE" name="l_name">
                            </div>

                            <div class="mb-3">
                                <label for="in_3" class="form-label">Department:</label>
                                <input type="text" class="form-control" id="in_3" placeholder="Ex- Computer Science"
                                    name="dept" required>
                            </div>

                            <div class="mb-3">
                                <label for="in_4" class="form-label"> Skills: </label>
                                <input type="text" class="form-control" id="in_4" placeholder="Ex- Machine learning"
                                    name="skills" required>
                            </div>


                            <div class="mb-3">
                                <label for="in_5" class="form-label"> City: </label>
                                <input type="text" class="form-control" id="in_5" placeholder="Ex- Kanpur" name="city"
                                    required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Upload Resume (PDF only)</label>
                                <input type="file" name="resume" class="form-control" accept=".pdf">
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="" id="checkIndeterminate"
                                    required>
                                <label class="form-check-label" for="checkIndeterminate">
                                    I Confirm
                                </label>
                            </div>
                            <br>
                            <div class="text-center">
                                <input type="submit" class="btn btn-primary" value="Confirm"><br><br>
                            </div>



                        </form>
                    </div>

                </div>

            </div>
        </div>
    </div>
    </div>
    <footer id="foot">
        <div id="copyright"> <br>
            @ 2026 Placement Portal | All Rights Reserverd
        </div>
    </footer>

    </nav>
</body>

</html>
