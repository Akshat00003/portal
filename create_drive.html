<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Drive </title>
    <link rel="stylesheet" href="../static/dashboard.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <style>
        #box2{
            width: 600px;
            margin-left: 460px;
            display: flex;
        }
        .drive{
            margin-left: 25px;
            margin-top: 20px;
            justify-content: center;
            align-items: center;
        }
        h4{
            padding-left: 10px;
            padding-top: 7px;
            background-color: yellow;
            width: 166px;
            height: 49px;
            border-radius: 10px;
            color: black;
        }
        .mb-3{
            width: 500px;
        }
    </style>
</head>

<body>
    <div class="main">
        <div id="canvas">
            <div id="nav">
                <h1>Placement Portal </h1>
            </div>
            <div id="navbar">
            </div>
            <div class="content">
                <div id="box1">
                    <div id="tags">
                        <a href="/company_dashboard/{{this_comp.company_id}}"class="btn btn-warning" > DASHBOARD </a>
                        <a href="/edit_comp_profile/{{this_comp.company_id}}" class="btn btn-warning"> COMPLETE PROFILE </a>
                        <a href="" class="btn btn-warning"> CREATE DRIVE </a>
                        <a href="/" class="btn btn-danger" > LOGOUT </a>
                    </div> 

                </div>
                    <div id="box2">
                        <div class="drive">
                            <h4> Create Drive :</h4>
                            <form action="/create_drive/{{this_comp.company_id}}" method="post">
                               
                                <div class="mb-3">
                                        <label for="job_title" class="form-label">Job Title :</label>
                                        <input type="text" class="form-control" id="job_title" placeholder="Enter Job Title" name="job_title" required>
                                </div>
                                <div class="mb-3">
                                        <label for="job_desc" class="form-label">Job Descripation :</label>
                                        <input type="text" class="form-control" id="job_desc" placeholder="Enter Job Descripation" name="job_desc" required>
                                </div>
                                <div class="mb-3">
                                        <label for="eligible_criteria" class="form-label">Min CGPA :</label>
                                        <input type="text" class="form-control" id="eligible_criteria" placeholder="Min CGPA" name="min_cgpa" required>
                                </div>
                                <div class="mb-3">
                                        <label for="drive_name" class="form-label">Drive Name :</label>
                                        <input type="text" class="form-control" id="drive_name" placeholder="Enter Drive name" name="drive_name" required>
                                </div>
                                <div class="mb-3">
                                        <label for="salary" class="form-label">Salary :</label>
                                        <input type="text" class="form-control" id="salary" placeholder="Enter Salary" name="salary" required> <br>
                                    
                                </div>
                                <div class="text-center">
                                    <input type="submit" class="btn btn-primary" value="Save">
                                </div>
                                 

                            </form>
                        </div>
                        
                    </div>
            </div>
        </div>
    </div>
    <footer id="foot">
        <div id="copyright"> <br>
            @ 2026 Placement Portal | All Rights Reserverd
        </div>
    </footer>

</nav>
</body>
</html>
