<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="../static/register.css">
</head>

<body>
    <div class="main">
        <div id="nav">
            <h1>Placement Portal </h1>
            <h3> Bringing Talent with Opportunity </h3>
        </div>
        <div id="content" style="display: flex; justify-content: center;">
            <div id="login-box">
                <div id="box1">
                    <h2> Register </h2>
                </div>
                <form action="/register" , method="post">
                    <div class="detail">
                        <div id="box2">
                            <div class="mb-3">
                                <label for="f_name" class="form-label">First name</label>
                                <input type="text" class="form-control" id="f_name" placeholder="First name"
                                    name="f_name" required>
                            </div>

                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" placeholder="Username"
                                    name="username" required>
                            </div>

                            <div class="mb-3">
                                <label for="contact" class="form-label">Contact</label>
                                <input type="number" class="form-control" id="contact" placeholder="Enter your contact no"
                                    name="contact" required> <br>
                            </div>
                            <span>Role :</span>
                            <label for="student"> Student </label>
                            <input type="radio" id="student" name="role" value="Student" required>
                            <label for="company"> HR </label>
                            <input type="radio" id="company" name="role" value="HR" required>
                        </div>
                        <div id="box3">
                            <div class="mb-3">
                                <label for="l_name" class="form-label">Last name</label>
                                <input type="text" class="form-control" id="l_name" placeholder="Last name"
                                    name="l_name" required>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" placeholder="Enter your email"
                                    name="email" required>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Create password</label>
                                <input type="password" class="form-control" id="password" placeholder="Set a password"
                                    name="password" required>
                            </div>
                            <div class="text-center">
                                <input type="submit" class="btn btn-primary" value="Register"><br><br>
                            </div>
                </form>
                Are you already a user ?
                 
                   <a href="/" class="btn btn-warning"> Login </a>

            </div>
        </div>

    </div>
    </div>
    </div>
    <footer id="foot">
        <div id="copyright"> <br>
            @ 2026 Placement Portal | All Rights Reserverd
        </div>
    </footer>
    </div>


</body>

</html>
