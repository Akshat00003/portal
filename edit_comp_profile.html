<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Your Profile</title>
    <link rel="stylesheet" href="../static/dashboard.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
            <style>
        #box2{
            width: 600px;
            margin-left: 460px;
            display: flex;
        }
        .Complete_profile{
            margin-left: 25px;
            margin-top: 20px;
            justify-content: center;
            align-items: center;
        }
        h4{
            padding-left: 10px;
            padding-top: 7px;
            background-color: yellow;
            width: 270px;
            height: 49px;
            border-radius: 10px;
            color: black;
        }
        .mb-3{
            width: 500px;
        }
    </style>
</head>
<body>
    <div class="main">
        <div id="canvas">
            <div id="nav">
                <h1>Placement Portal </h1>
            </div>
            <div id="navbar">
                
            </div>
            <div class="content">
                <div id="box1">
                    <div id="tags">
                        <a href="/company_dashboard/{{this_user.id}}"class="btn btn-warning" > DASHBOARD </a>
                        <a href="" class="btn btn-warning"> COMPLETE PROFILE </a>
                        <a href="/create_drive/{{this_user.id}}" class="btn btn-warning"> CREATE DRIVE </a>
                        <a href="/" class="btn btn-danger" > LOGOUT </a>
                    </div> 

                </div>
                    <div id="box2">
                        <div class="Complete_profile">
                            <h4> Complete Your Profile :</h4>
                            <form action="/edit_comp_profile/{{this_user.id}}" method="post">
                                <div class="mb-3">
                                        <label for="comp_name" class="form-label">Company Name :</label>
                                        <input type="text" class="form-control" id="comp_name" placeholder="Enter Company Name" name="company_name" required>
                                </div>
                                <div class="mb-3">
                                        <label for="web" class="form-label">Website :</label>
                                        <input type="text" class="form-control" id="web" placeholder=" Name of Website" name="website" required>
                                </div>
                                <div class="mb-3">
                                        <label for="cont" class="form-label">HR Contact No :</label>
                                        <input type="text" class="form-control" id="cont" placeholder="Enter HR Contact No" name="hr_contact">
                                </div>
                                <div class="mb-3">
                                        <label for="city" class="form-label">City :</label>
                                        <input type="text" class="form-control" id="city" placeholder="Enter Your City" name="city" required>
                                </div>
                                <div class="mb-3">
                                        <label for="year" class="form-label">Established Year :</label>
                                        <input type="text" class="form-control" id="year" placeholder="Establishment Year" name="year" required>
                                </div>
                                
                                <div class="text-center">
                                    <input type="submit" class="btn btn-primary" value="Save">
                            </form>
                        </div>
                    </div>
            </div>
        </div>
    </div>
    <footer id="foot">
        <div id="copyright"> <br>
            @ 2026 Placement Portal | All Rights Reserverd
        </div>
    </footer>

</nav>
</body>
</html>
